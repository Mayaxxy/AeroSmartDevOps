version: '3.8'

services:
  # Base de datos PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: flytrack-postgres
    environment:
      POSTGRES_DB: aerosmart
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - flytrack-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Aplicación FlyTrack Backend
  flytrack-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flytrack-backend
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/aerosmart
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: mySecretKeyForJWTTokenGenerationAndValidation12345
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - flytrack-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  flytrack-network:
    driver: bridge
