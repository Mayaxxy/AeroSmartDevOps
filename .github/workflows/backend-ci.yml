name: FlyTrack Backend CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: aerosmart
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Dar permisos a Gradle
        run: chmod +x gradlew

      - name: Compilar proyecto
        run: ./gradlew build -x test

      - name: Ejecutar pruebas unitarias
        run: ./gradlew test
        env:
          DB_URL: jdbc:postgresql://localhost:5432/aerosmart
          DB_USER: postgres
          DB_PASSWORD: postgres
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRATION: ${{ secrets.JWT_EXPIRATION }}

      - name: Login a Azure Container Registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: flytrackregistry.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build y push imagen Docker
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: flytrackregistry.azurecr.io/flytrack-backend:latest

      - name: Desplegar en VM por SSH
        if: github.ref == 'refs/heads/main'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            docker login flytrackregistry.azurecr.io -u ${{ secrets.ACR_USERNAME }} -p ${{ secrets.ACR_PASSWORD }}
            docker pull flytrackregistry.azurecr.io/flytrack-backend:latest
            docker stop flytrack-backend || true
            docker rm flytrack-backend || true
            docker run -d \
              --name flytrack-backend \
              --restart unless-stopped \
              -p 8080:8080 \
              -e DB_URL="jdbc:postgresql://flytrack-postgres-server.postgres.database.azure.com:5432/aerosmart" \
              -e DB_USER="postgresadmin" \
              -e DB_PASSWORD="FlyTrack2025Secure!" \
              -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              -e JWT_EXPIRATION="${{ secrets.JWT_EXPIRATION }}" \
              flytrackregistry.azurecr.io/flytrack-backend:latest